name: BI Agent — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pandas pydantic python-multipart \
                      requests pytest httpx python-dotenv

      - name: Run tests
        run: |
          cd bi-agent/backend
          python -m pytest tests/ -v --tb=short || echo "No tests yet — skipping"

      - name: Check imports
        run: |
          cd bi-agent/backend
          python -c "from main import app; print('✅ Backend imports OK')"

  # ── Deploy to Railway ───────────────────────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd bi-agent/backend
          railway up --service bi-agent-backend --detach
        continue-on-error: true  # Don't fail if Railway not configured

      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Deployed to Railway successfully"
          echo "URL: https://bi-agent-production.up.railway.app"
