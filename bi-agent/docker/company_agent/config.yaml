# BI Agent — Company Docker Agent Config
# Fill in your database credentials and save this file.
# Never commit this file to GitHub (already in .gitignore)

database:
  type: postgres          # postgres | mysql
  host: your-db-host
  port: 5432              # 5432 for postgres, 3306 for mysql
  name: your_database
  username: readonly_user
  password: your_password

agent:
  api_url: http://localhost:8000          # or your Railway URL
  api_key: your_secret_api_key_here      # must match AGENT_API_KEY in .env
  company_name: My Company
  industry: general
  tables:
    - sales
    - customers
    - orders
  sync_interval_minutes: 60              # how often to sync (60 = every hour)
  sync_time: "08:00"                     # daily sync time (HH:MM)
