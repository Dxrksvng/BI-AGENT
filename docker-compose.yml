version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       bi_agent
      POSTGRES_USER:     bi_user
      POSTGRES_PASSWORD: bi_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bi_user -d bi_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bi_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./bi-agent/backend
      dockerfile: Dockerfile
    container_name: bi_backend
    restart: unless-stopped
    environment:
      AI_PROVIDER:      ollama
      OLLAMA_URL:       http://ollama:11434
      OLLAMA_MODEL:     qwen2.5:latest
      REDIS_URL:        redis://redis:6379/0
      DATABASE_URL:     postgresql+psycopg2://bi_user:bi_secret@postgres:5432/bi_agent
      AGENT_API_KEY:    ${AGENT_API_KEY:-dev-key-change-in-production}
      REPORTS_DIR:      /app/reports
    volumes:
      - reports_data:/app/reports
      - ./bi-agent/backend/fonts:/app/fonts
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Streamlit Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./bi-agent
      dockerfile: Dockerfile.frontend
    container_name: bi_frontend
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

  # ── Ollama (Local AI) ───────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: bi_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Ollama Model Puller (runs once) ────────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: bi_ollama_pull
    entrypoint: >
      sh -c "sleep 5 && ollama pull qwen2.5:latest"
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama
    restart: "no"

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bi_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  reports_data:
  ollama_data:
